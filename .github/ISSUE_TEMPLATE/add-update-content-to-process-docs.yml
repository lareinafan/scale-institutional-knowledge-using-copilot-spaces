name: "Add Content to Project Management Process Docs"
description: "Request to add new content or updates to an existing program management process document."
title: "[Process Doc Update]: "
labels: ["documentation", "process improvement"]
body:
  - type: dropdown
    id: process_doc
    attributes:
      label: "Which process document do you want to update? (If this is a new document, select '<new document>')"
      description: "Select the program management process document you want to add content to. If this is a new process doc, choose '<new document>'."
      options:
        - octoacme-project-management-overview.md
        - octoacme-project-initiation.md
        - octoacme-project-planning.md
        - octoacme-execution-and-tracking.md
        - octoacme-risks-and-communication.md
        - octoacme-release-and-deployment.md
        - octoacme-retrospective-and-continuous-improvement.md
        - octoacme-roles-and-personas.md
        - <new document>
    validations:
      required: true

  - type: textarea
    id: content_summary
    attributes:
      label: "Summary of New Content"
      description: "Briefly describe the new content or update you want to add."
      placeholder: "E.g., Add clarification to risk escalation paths, new checklist for releases, additional role responsibilities, etc."
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: "Why is this update needed?"
      description: "Explain the reason for this addition. Is it to address a gap, improve clarity, incorporate a best practice, etc.?"
      placeholder: "E.g., Identified gap in process, team feedback, alignment with industry standards, etc."
    validations:
      required: true

  - type: dropdown
    id: lifecycle_phase
    attributes:
      label: "Which lifecycle phase(s) does this update affect most?"
      description: "Select the primary phase this change supports."
      options:
        - Initiation
        - Planning
        - Execution & Tracking
        - Risk Management & Communication
        - Release & Deployment
        - Retrospective & Continuous Improvement
        - Cross-phase / Multiple phases
    validations:
      required: true

  - type: textarea
    id: ownership_and_handoffs
    attributes:
      label: "Ownership and handoffs"
      description: "Who owns this process step and who receives the handoff? Include any role/persona changes."
      placeholder: "Owner: Project Manager\nHandoff to: Engineering Manager + Developers\nImpacted personas: Release Manager, Support Readiness Lead"
    validations:
      required: true

  - type: textarea
    id: example_content
    attributes:
      label: "Suggested Content (optional)"
      description: "Paste the proposed new text, checklist, diagram, or example content you'd like to add. (Optional)"
      placeholder: "E.g., - New checklist items, - Copy for a new section, - Example scenario, etc."

  - type: textarea
    id: operating_details
    attributes:
      label: "Cadence, status signals, and success check"
      description: "Document expected cadence and how teams will know the update is working."
      placeholder: "Cadence: weekly risk review\nStatus signals: risk register updated + clear blocker owner\nSuccess check: fewer unclear escalations over 2 sprints"
    validations:
      required: true

  - type: checkboxes
    id: acceptance_criteria
    attributes:
      label: "Acceptance Criteria"
      description: "Check all that apply:"
      options:
        - label: "Content aligns with existing process docs"
        - label: "Update improves clarity or closes a documented gap"
        - label: "Proposed content has been reviewed with stakeholders (if needed)"
        - label: "Handoffs, ownership, and cadence are explicit and actionable"
        - label: "Feedback loop to backlog/docs updates is described"
